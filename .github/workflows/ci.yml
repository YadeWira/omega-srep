name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Build osrep
      run: ./Makefile

    - name: Test osrep
      run: bin/osrep

    - name: Round-trip suite
      run: bash tests/roundtrip.sh

    - name: Random fuzz round-trip
      run: bash tests/fuzz.sh 10

    - name: Dedup cross-test (C++ vs Python prototype)
      run: bash tests/dedup_xtest.sh

    - name: -dup pipeline round-trip
      run: bash tests/dup_roundtrip.sh
