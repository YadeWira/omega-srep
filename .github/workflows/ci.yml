name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Build osrep
      run: ./Makefile

    - name: Test osrep
      run: bin/osrep

    - name: Round-trip suite
      run: bash tests/roundtrip.sh
