name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build osrep
      run: ./Makefile

    - name: Test osrep
      run: bin/osrep

    - name: Round-trip suite
      run: bash tests/roundtrip.sh

    - name: Random fuzz round-trip (incl. -dup)
      run: OSREP_FUZZ_DUP=1 bash tests/fuzz.sh 10

    - name: Dedup cross-test (C++ vs Python prototype)
      run: bash tests/dedup_xtest.sh

    - name: -dup pipeline round-trip (F5.3a shell wrapper)
      run: bash tests/dup_roundtrip.sh

    - name: Native -dup round-trip + interop (F5.3b)
      run: bash tests/dup_native_roundtrip.sh

    - name: -dup archive corruption fuzz (stable)
      run: bash tests/dup_corruption_fuzz.sh

    - name: -dup concurrency stress (stable)
      run: bash tests/dup_concurrency.sh

    - name: Fuzz-found regression replay
      run: bash tests/fuzz_regression.sh
